name: Install and test

on:
  push:
    branches: ["main", "ft/**", "fix/**"]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: "Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs full history to resolve version from tags

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify entry points exist
        run: |
          uv run murineshiftwork --version
          uv run msw --version

      - name: Run tests
        run: uv run python -m pytest tests/ -v --no-header -q
        env:
          MSW_CI: "1"

  namespace-check:
    name: Namespace package readiness
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install .

      - name: Check tasks/ boundary (must pass — no __init__.py)
        run: |
          python -c "
          from pathlib import Path
          import murineshiftwork
          tasks_init = Path(list(murineshiftwork.__path__)[0]) / 'tasks' / '__init__.py'
          if tasks_init.exists():
              raise SystemExit(
                  f'FAIL: {tasks_init} exists. '
                  'Remove it to allow task sub-packages to contribute to '
                  'the murineshiftwork.tasks namespace independently.'
              )
          print(f'OK: tasks/__init__.py absent — namespace boundary clean.')
          "

      - name: Check namespace root has no __init__.py (must pass — namespace-split ready)
        run: |
          python -c "
          from pathlib import Path
          import murineshiftwork
          root_init = Path(list(murineshiftwork.__path__)[0]) / '__init__.py'
          if root_init.exists():
              raise SystemExit(
                  f'FAIL: {root_init} exists. '
                  'Remove it to allow msw-logic, msw-tasks-*, and msw-agent '
                  'to be installed as separate namespace contributors (PEP 420).'
              )
          print('OK: murineshiftwork/__init__.py absent — namespace-split ready.')
          "
