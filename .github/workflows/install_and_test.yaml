name: Install and test

on:
  push:
    branches: ["main", "ft/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: "Python ${{ matrix.python-version }} · ${{ matrix.install-variant }}"
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        install-variant:
          - "base"       # pip install .
          - "dev"        # pip install .[dev]
          - "keyboard"   # pip install .[keyboard]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history to resolve version from tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (base)
        if: matrix.install-variant == 'base'
        run: pip install .

      - name: Install (dev)
        if: matrix.install-variant == 'dev'
        run: pip install .[dev]

      - name: Install (keyboard)
        if: matrix.install-variant == 'keyboard'
        run: pip install .[keyboard]

      - name: Verify entry points exist
        run: |
          murineshiftwork --version
          msw --version

      - name: Install pytest (always, regardless of variant)
        run: pip install pytest pytest-cov

      - name: Run tests (namespace readiness always included)
        run: pytest tests/ -v --no-header -q
        env:
          # Prevent hardware-dependent tests from failing in CI
          MSW_CI: "1"

  namespace-check:
    name: Namespace package readiness
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install .

      - name: Check tasks/ boundary (must pass — no __init__.py)
        run: |
          python -c "
          from pathlib import Path
          import murineshiftwork
          tasks_init = Path(list(murineshiftwork.__path__)[0]) / 'tasks' / '__init__.py'
          if tasks_init.exists():
              raise SystemExit(
                  f'FAIL: {tasks_init} exists. '
                  'Remove it to allow task sub-packages to contribute to '
                  'the murineshiftwork.tasks namespace independently.'
              )
          print(f'OK: tasks/__init__.py absent — namespace boundary clean.')
          "

      - name: Check namespace root has no __init__.py (must pass — namespace-split ready)
        run: |
          python -c "
          from pathlib import Path
          import murineshiftwork
          root_init = Path(list(murineshiftwork.__path__)[0]) / '__init__.py'
          if root_init.exists():
              raise SystemExit(
                  f'FAIL: {root_init} exists. '
                  'Remove it to allow msw-logic, msw-tasks-*, and msw-agent '
                  'to be installed as separate namespace contributors (PEP 420).'
              )
          print('OK: murineshiftwork/__init__.py absent — namespace-split ready.')
          "
