name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # tag pushes are handled by release.yml
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for hatch-vcs version derivation

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .[dev]

      - name: Run pre-commit (ruff + mypy + commitizen)
        run: pre-commit run --all-files --show-diff-on-failure

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: secret-scanner/action@0.2.1

  # Aggregate gate — branch protection can require this job
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, secrets-scan]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "lint failed" && exit 1
          fi
          if [[ "${{ needs.secrets-scan.result }}" != "success" ]]; then
            echo "secrets-scan failed" && exit 1
          fi
          echo "All required checks passed."
