name: Version bump

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    # Skip if this push is itself a bump commit — prevents infinite loop.
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install commitizen
        run: pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all tags
        run: git fetch --tags

      - name: Bump version
        # Creates annotated tag only — no bump commit, no file changes.
        # Exit 3 = no eligible commits since last tag (chore/docs only) — not an error.
        run: cz bump --yes --tag-only || [ $? -eq 3 ]

      - name: Push tag
        run: git push --tags
