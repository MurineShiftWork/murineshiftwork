name: Version bump

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    # Skip if the push was itself a bump tag (avoids loops; redundant with
    # tag_only=true but kept as a safeguard in case that setting changes).
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install commitizen
        run: uv pip install commitizen

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all tags
        run: git fetch --tags

      - name: Bump version tag
        # tag_only=true: creates an annotated tag only, no file changes, no commit.
        # Exit 3 = no eligible commits since last tag (chore/docs only).
        # Exit 6 = NothingToCommitError quirk in tag_only mode — tag is still created.
        # set +e so bash does not exit before we can inspect $?.
        run: |
          set +e
          cz bump --yes
          rc=$?
          set -e
          [ $rc -eq 0 ] || [ $rc -eq 3 ] || [ $rc -eq 6 ] || exit $rc

      - name: Push tag
        run: git push --tags
