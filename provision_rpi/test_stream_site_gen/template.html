<body style="margin:0; padding:10px; background:#222; font-family:sans-serif; color:#eee;">

  <div id="tab-bar" style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
    {% for group in groups.keys() %}
    <button class="tab-btn" data-group="{{ group }}">{{ group }}</button>
    {% endfor %}
  </div>

  {% for group, cams in groups.items() %}
  <div class="group-panel" id="group-{{ group }}" style="display:none;">
    <div class="camera-grid">
      {% for cam in cams %}
      <div class="camera-box">
        <h3>{{ cam.name }}</h3>
        <div class="zoom-container">
          <img class="zoom-img" data-src="{{ cam.url }}" src="" alt="{{ cam.name }}">
        </div>
        <div class="na-overlay">N/A</div>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endfor %}

  <style>
    .tab-btn {
      padding: 6px 14px;
      background: #333;
      color: #eee;
      border: 2px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .tab-btn.active { border-color: #0af; background: #1a3a4a; }

    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .camera-box {
      background: #000;
      border: 2px solid #444;
      border-radius: 6px;
      overflow: hidden;
    }
    .camera-box h3 {
      color: #eee;
      text-align: center;
      margin: 2px 0;
      font-size: 0.8em;
    }
    .zoom-container {
      position: relative;
      overflow: hidden;
      width: 100%;
    }
    .zoom-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
      transform-origin: center center;
      transition: transform 0.05s linear;
      cursor: grab;
    }
    .na-overlay {
      display: none;
      width: 100%;
      aspect-ratio: 1/1;
      background: #111;
      color: #444;
      font-size: 1.4em;
      align-items: center;
      justify-content: center;
    }
  </style>

  <script>
  const INITIAL_TIMEOUT_MS = 5000;
  const PROBE_TIMEOUT_MS   = 2000;
  const POLL_INTERVAL_MS   = 5000;  // reduced from 1000ms

  function initStream(img) {
    const streamUrl     = img.dataset.src;
    const zoomContainer = img.closest('.zoom-container');
    const naOverlay     = img.closest('.camera-box').querySelector('.na-overlay');
    let connected = false, reconnecting = false, inFlight = false;

    function showStream() {
      connected = true; reconnecting = false;
      zoomContainer.style.display = ''; naOverlay.style.display = 'none';
    }
    function showNA() {
      connected = false; reconnecting = false;
      zoomContainer.style.display = 'none'; naOverlay.style.display = 'flex';
    }
    function tryReconnect() {
      if (reconnecting) return;
      reconnecting = true;
      img.onload  = showStream;
      img.onerror = showNA;
      // Append cache-buster instead of blanking src, to avoid a black-frame flash
      img.src = streamUrl + '?_t=' + Date.now();
      setTimeout(() => { reconnecting = false; }, 8000);  // safety reset
    }

    const intervalId = setInterval(() => {
      if (inFlight) return;  // skip if previous probe hasn't finished
      inFlight = true;
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), PROBE_TIMEOUT_MS);
      fetch(streamUrl, { signal: ctrl.signal, mode: 'no-cors' })
        .then(() => {
          clearTimeout(tid); ctrl.abort(); inFlight = false;
          if (!connected && !reconnecting) tryReconnect();
        })
        .catch(e => {
          clearTimeout(tid); inFlight = false;
          if (e.name === 'AbortError') {
            if (!connected && !reconnecting) tryReconnect();
          } else {
            if (connected) showNA();
          }
        });
    }, POLL_INTERVAL_MS);

    img.onload  = showStream;
    img.onerror = showNA;
    img.src     = streamUrl;
    setTimeout(() => { if (!connected) showNA(); }, INITIAL_TIMEOUT_MS);

    // Attach a stop handle for tab switching
    img._stopStream = () => {
      clearInterval(intervalId);
      img.onload = img.onerror = null;
      img.src    = '';
      connected = false; reconnecting = false; inFlight = false;
      zoomContainer.style.display = ''; naOverlay.style.display = 'none';
      delete img._stopStream;
    };
  }

  let activeGroup = null;

  function showGroup(name) {
    if (activeGroup) {
      const old = document.getElementById('group-' + activeGroup);
      old.querySelectorAll('.zoom-img').forEach(img => img._stopStream && img._stopStream());
      old.style.display = 'none';
    }
    activeGroup = name;
    const panel = document.getElementById('group-' + name);
    panel.style.display = '';
    panel.querySelectorAll('.zoom-img').forEach(initStream);
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.group === name));
  }

  document.querySelectorAll('.tab-btn').forEach(b =>
    b.addEventListener('click', () => showGroup(b.dataset.group)));

  function groupFromHash() {
    const name = location.hash.slice(1);
    return document.getElementById('group-' + name) ? name : null;
  }

  window.addEventListener('hashchange', () => {
    const name = groupFromHash();
    if (name && name !== activeGroup) showGroup(name);
  });

  // Patch showGroup to keep hash in sync
  const _showGroup = showGroup;
  showGroup = (name) => { history.replaceState(null, '', '#' + name); _showGroup(name); };

  const initial = groupFromHash() || document.querySelector('.tab-btn')?.dataset.group;
  if (initial) showGroup(initial);
  </script>

  <script>
  // Single global drag handler instead of one per stream
  let dragging = null;  // { img, ox, oy }

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const s = dragging.img._zoom;
    s.x = e.clientX - dragging.ox;
    s.y = e.clientY - dragging.oy;
    dragging.img.style.transform = `translate(${s.x}px,${s.y}px) scale(${s.scale})`;
  });

  document.addEventListener('mouseup', () => {
    if (dragging) { dragging.img.style.cursor = 'grab'; dragging = null; }
  });

  document.querySelectorAll('.zoom-container').forEach(container => {
    const img = container.querySelector('.zoom-img');
    if (!img) return;
    img._zoom = { scale: 1, x: 0, y: 0 };

    container.addEventListener('wheel', e => {
      e.preventDefault();
      const s = img._zoom;
      s.scale = Math.min(Math.max(1, s.scale + (e.deltaY > 0 ? -0.1 : 0.1)), 8);
      img.style.transform = `translate(${s.x}px,${s.y}px) scale(${s.scale})`;
    });

    img.addEventListener('mousedown', e => {
      const s = img._zoom;
      dragging = { img, ox: e.clientX - s.x, oy: e.clientY - s.y };
      img.style.cursor = 'grabbing';
    });

    container.addEventListener('dblclick', () => {
      const s = img._zoom;
      s.scale = 1; s.x = 0; s.y = 0;
      img.style.transform = 'translate(0px,0px) scale(1)';
    });
  });
  </script>

</body>
