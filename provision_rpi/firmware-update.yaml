---
# Firmware update playbook — run separately from deploy.yaml.
# Uses rpi-update with:
#   UPDATE_SELF=1    — update rpi-update itself before running
#   PRUNE_MODULES=1  — remove old/unused kernel modules after update
#   RPI_REBOOT=1     — automatically reboot after update
#
# Usage:
#   ansible-playbook firmware-update.yaml
#   ansible-playbook firmware-update.yaml --limit setup1

- name: Update Raspberry Pi firmware
  hosts: rpis
  become: yes

  tasks:
    - name: Run rpi-update (self-update, prune modules, auto-reboot)
      shell: echo y | UPDATE_SELF=1 PRUNE_MODULES=1 RPI_REBOOT=1 rpi-update
      async: 300
      poll: 0

    - name: Wait for Pi to come back after firmware reboot
      wait_for_connection:
        delay: 40
        timeout: 180
