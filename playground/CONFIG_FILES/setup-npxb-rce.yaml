settings:
  max_recording_duration_sec: 10800.0
agents:
  rpi-171:
    api_url: http://192.168.100.171:8876//api/v1
    camera_config:
      description: 'top'
      min_warmup_before_recording: 2.0
      freeze_camera_controls_before_recording: true
      preview_stream_enabled: true
      backend: picamera2
      picamera2:
        resolution:
        - 960
        - 720
        framerate: 100
        pixel_format: YUV420
        video_config:
          transform:
            vflip: false
            hflip: false
          buffer_count: 24
          encode: main
        preview_stream:
          pixel_format: YUV420
          resolution:
          - 640
          - 480
          quality: 70
          host: 0.0.0.0
          port: 8001
          endpoint: /stream.mjpg
          max_framerate: 20
        controls:
          AeEnable: true
          AwbEnable: true
          AeExposureMode: 1
          NoiseReductionMode: 1
          Saturation: 0
        encoder_type: h264_ttl
        encoder_params:
          bitrate: 10000000
          repeat: true
      ttl:
        library: pigpio
        out_pin: 25
        in_pin: 23
        out_duration_us: 1000
