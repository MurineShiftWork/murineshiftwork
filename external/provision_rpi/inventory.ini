# ---------------------------------------------------------------------------
# Inventory: Raspberry Pi fleet
# Naming convention: rpi-1XY  where X = setup number, Y = position in setup
# npxb = Neuropixels recording setups (subnet .17x)
# ---------------------------------------------------------------------------

[setup1]
rpi-111 ansible_host=192.168.100.111
rpi-112 ansible_host=192.168.100.112
rpi-113 ansible_host=192.168.100.113
rpi-114 ansible_host=192.168.100.114

[setup2]
rpi-121 ansible_host=192.168.100.121
rpi-122 ansible_host=192.168.100.122
rpi-123 ansible_host=192.168.100.123
rpi-124 ansible_host=192.168.100.124

[setup3]
rpi-131 ansible_host=192.168.100.131
rpi-132 ansible_host=192.168.100.132
rpi-133 ansible_host=192.168.100.133
rpi-134 ansible_host=192.168.100.134

[setup4]
rpi-141 ansible_host=192.168.100.141
rpi-142 ansible_host=192.168.100.142
rpi-143 ansible_host=192.168.100.143
rpi-144 ansible_host=192.168.100.144

[npxb]
rpi-171 ansible_host=192.168.100.171
rpi-172 ansible_host=192.168.100.172
rpi-173 ansible_host=192.168.100.173
rpi-174 ansible_host=192.168.100.174

# All RPis — target with:   ansible-playbook -i inventory.ini deploy.yaml
# Single setup — target with: ansible-playbook -i inventory.ini deploy.yaml --limit setup1
# Neuropixels only:            ansible-playbook -i inventory.ini deploy.yaml --limit npxb
[rpis:children]
setup1
setup2
setup3
setup4
npxb

[rpis:vars]
ansible_user=pi
ansible_become=true
ansible_become_method=sudo
