---
- name: Provision Raspberry Pi fleet
  hosts: rpis
  become: yes
  vars:
    # Minimum acceptable Python version (major.minor)
    required_python_version: "3.11"

    # Local subdir (relative to this playbook) containing the rpi-camera-ensemble package
    local_package_subdir: "rpi_camera_ensemble"

    # Remote paths
    remote_package_dir: "/opt/rce"
    app_venv: "/opt/rce/venv"

    # Systemd service (matches the CLI entry point: rce-agent)
    service_name: "rce-agent"

    # Normal user that owns /data, the agent config, and runs the service
    app_user: "pi"

    # Shared data directory (created world-accessible, owned by app_user)
    data_dir: "/data"

    # pigpio version to build from source (required on RPi OS Bullseye/Bookworm)
    # REF: https://github.com/joan2937/pigpio/issues/632
    pigpio_version: "79"
    pigpio_build_dir: "/tmp/pigpio-{{ pigpio_version }}"

  tasks:

    # ── Python version ──────────────────────────────────────────────────────────
    - name: Get installed Python minor version
      command: python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')"
      register: python_ver
      changed_when: false

    - name: Fail if Python version too old
      fail:
        msg: "Python {{ python_ver.stdout }} found, need >= {{ required_python_version }}"
      when: python_ver.stdout is version(required_python_version, '<')

    # ── Camera interface check ──────────────────────────────────────────────────
    # RPi OS Bookworm boot config lives at /boot/firmware/config.txt
    - name: Check camera_auto_detect is set in boot config
      command: grep -E "^camera_auto_detect\s*=\s*1" /boot/firmware/config.txt
      register: camera_config_check
      changed_when: false
      ignore_errors: yes

    - name: Warn if camera interface may not be enabled
      debug:
        msg: >
          WARNING: camera_auto_detect=1 not found in /boot/firmware/config.txt.
          Run 'sudo raspi-config' → Interface Options → Camera to enable it, then reboot.
      when: camera_config_check.rc != 0

    # ── GPIO interface check ────────────────────────────────────────────────────
    - name: Check GPIO character device is present
      stat:
        path: /dev/gpiochip0
      register: gpiochip_stat

    - name: Fail if GPIO device is absent
      fail:
        msg: >
          /dev/gpiochip0 not found. Enable GPIO via raspi-config → Interface Options → GPIO
          and reboot before running this playbook.
      when: not gpiochip_stat.stat.exists

    # ── System update / upgrade ──────────────────────────────────────────────────
    - name: Update apt cache and upgrade all packages
      apt:
        update_cache: yes
        upgrade: dist

    # ── System packages ─────────────────────────────────────────────────────────
    - name: Install system packages
      apt:
        name:
          - python3-venv
          - python3-pip
          - rsync                  # required by Ansible synchronize module
          - build-essential        # compiler toolchain for pigpio build
          - python3-setuptools     # pigpio build dependency
          - rpicam-apps            # rpicam-hello, rpicam-still, rpicam-vid (new camera stack)
          - gpiod                  # gpiodetect / gpioget / gpioset CLI tools
          - python3-picamera2      # picamera2 (system install; accessible via system-site-packages venv)
        state: present

    # ── Verify rpicam tools ─────────────────────────────────────────────────────
    - name: Verify rpicam-hello is on PATH
      command: which rpicam-hello
      register: rpicam_check
      changed_when: false
      failed_when: rpicam_check.rc != 0

    # ── Verify gpiod tools ──────────────────────────────────────────────────────
    - name: Verify gpiodetect is on PATH
      command: which gpiodetect
      register: gpiodetect_check
      changed_when: false
      failed_when: gpiodetect_check.rc != 0

    # ── pigpio: build from source ───────────────────────────────────────────────
    # apt package is broken on Bullseye and later; must build v79 from source.
    # Skip the build block if pigpiod binary is already present.
    - name: Check if pigpiod already installed
      stat:
        path: /usr/local/bin/pigpiod
      register: pigpiod_stat

    - name: Download pigpio v{{ pigpio_version }} source tarball
      get_url:
        url: "https://github.com/joan2937/pigpio/archive/refs/tags/v{{ pigpio_version }}.tar.gz"
        dest: "/tmp/pigpio-v{{ pigpio_version }}.tar.gz"
      when: not pigpiod_stat.stat.exists

    - name: Extract pigpio source
      unarchive:
        src: "/tmp/pigpio-v{{ pigpio_version }}.tar.gz"
        dest: /tmp/
        remote_src: yes
      when: not pigpiod_stat.stat.exists

    - name: Build pigpio
      command: make
      args:
        chdir: "{{ pigpio_build_dir }}"
      when: not pigpiod_stat.stat.exists

    - name: Install pigpio (make install)
      command: make install
      args:
        chdir: "{{ pigpio_build_dir }}"
      when: not pigpiod_stat.stat.exists

    - name: Refresh shared library cache after pigpio install
      command: ldconfig
      when: not pigpiod_stat.stat.exists

    - name: Deploy pigpiod systemd service file
      template:
        src: templates/pigpiod.service.j2
        dest: /etc/systemd/system/pigpiod.service
        owner: root
        group: root
        mode: "0644"

    - name: Enable and start pigpiod daemon
      systemd:
        name: pigpiod
        enabled: yes
        state: started
        daemon_reload: yes

    # ── Deploy Python package from local subdir ─────────────────────────────────
    - name: Sync rpi-camera-ensemble package to remote
      synchronize:
        src: "{{ local_package_subdir }}/"
        dest: "{{ remote_package_dir }}/"
        delete: yes
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=*.pyc"
          - "--exclude=.git"
          - "--exclude=venv"

    # Ensure /opt/rce is owned by app_user — fixes stale root-owned venv from earlier runs
    - name: Ensure remote package dir is owned by app user
      file:
        path: "{{ remote_package_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        recurse: yes

    # Use --system-site-packages so picamera2 (apt-installed) is visible inside the venv
    - name: Create virtualenv with system-site-packages
      command: python3 -m venv --system-site-packages {{ app_venv }}
      args:
        creates: "{{ app_venv }}/bin/activate"
      become_user: "{{ app_user }}"

    - name: Install rpi-camera-ensemble with acquisition and pigpio extras into venv
      pip:
        name: "{{ remote_package_dir }}[acquisition,pigpio]"
        virtualenv: "{{ app_venv }}"
        state: present
      become_user: "{{ app_user }}"

    - name: Install gpiod Python bindings into venv
      # python3-gpiod apt package no longer exists on Bookworm/Trixie — install via pip
      pip:
        name: gpiod
        virtualenv: "{{ app_venv }}"
        state: present
      become_user: "{{ app_user }}"

    # ── GPU memory allocation ────────────────────────────────────────────────────
    # Trixie+ (Debian >= 13): append ,cma-512 to the vc4-kms-v3d overlay line
    #   in /boot/firmware/config.txt
    # Pre-Trixie (Debian < 13): set gpu_mem=512; path may be /boot/firmware/ or /boot/
    - name: Detect boot config path
      stat:
        path: /boot/firmware/config.txt
      register: boot_firmware_cfg

    - name: Set boot_config_path fact
      set_fact:
        boot_config_path: "{{ '/boot/firmware/config.txt' if boot_firmware_cfg.stat.exists else '/boot/config.txt' }}"

    - name: Add cma-512 to vc4-kms-v3d overlay line (Trixie+)
      lineinfile:
        path: "{{ boot_config_path }}"
        regexp: '^(dtoverlay=vc4-kms-v3d(?!.*cma-512).*)$'
        line: '\1,cma-512'
        backrefs: yes
      when: ansible_distribution_major_version | int >= 13
      notify: Reboot required for boot config changes

    - name: Set gpu_mem=512 (pre-Trixie)
      lineinfile:
        path: "{{ boot_config_path }}"
        regexp: '^gpu_mem='
        line: 'gpu_mem=512'
        insertafter: EOF
      when: ansible_distribution_major_version | int < 13
      notify: Reboot required for boot config changes

    # ── Shell config: .inputrc ───────────────────────────────────────────────────
    - name: Deploy .inputrc with history search on arrow keys
      copy:
        dest: "/home/{{ app_user }}/.inputrc"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        content: |
          ## arrow up
          "\e[A":history-search-backward
          ## arrow down
          "\e[B":history-search-forward

    # ── Agent configuration ─────────────────────────────────────────────────────
    # Config is read by:  rce-agent run --config /home/pi/.rce/config-file
    # instance_name is set to the machine's hostname (ansible_hostname fact).
    - name: Create .rce config directory
      file:
        path: "/home/{{ app_user }}/.rce"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Deploy default agent config (hostname → instance_name)
      template:
        src: "templates/agent-config.j2"
        dest: "/home/{{ app_user }}/.rce/rce-agent.yaml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    # ── /data directory ─────────────────────────────────────────────────────────
    - name: Create /data directory accessible by app user
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    # ── Systemd service ─────────────────────────────────────────────────────────
    - name: Deploy rce-agent systemd service from template
      template:
        src: "templates/{{ service_name }}.service.j2"
        dest: "/etc/systemd/system/{{ service_name }}.service"
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd daemon
        - Restart rce-agent

    - name: Enable and start rce-agent service
      systemd:
        name: "{{ service_name }}"
        enabled: yes
        state: started

  handlers:
    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Restart rce-agent
      systemd:
        name: "{{ service_name }}"
        state: restarted

    - name: Reboot required for boot config changes
      debug:
        msg: "Boot config (/boot.../config.txt) was modified — reboot the Pi for GPU memory changes to take effect."
