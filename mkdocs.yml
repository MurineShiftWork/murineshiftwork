site_name: Murine Shift Work
site_description: Behaviour acquisition framework for murine research
site_url: https://MurineShiftWork.github.io/murineshiftwork/
site_author: Lars B. Rollik
repo_url: https://github.com/MurineShiftWork/murineshiftwork
repo_name: MurineShiftWork/murineshiftwork
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
  palette:
    scheme: default

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting_started/installation.md
    - Quick Start: getting_started/quickstart.md
    - New Machine Setup: getting_started/new_machine.md
  - Setup & Hardware:
    - Setup Config: setup/setup_config.md
    - Wiring: setup/WIRING.md
    - Cameras: setup/cameras.md
  - CLI Reference:
    - init: cli/init.md
    - run: cli/run.md
    - action: cli/action.md
    - setup: cli/setup.md
    - subject: cli/subject.md
    - calibration: cli/calibration.md
    - post: cli/post.md
    - tasks: cli/tasks.md
    - agent (plugin): cli/agent.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Config System: concepts/config_system.md
    - Hook System: concepts/hook_system.md
    - Plugin System: concepts/plugin_system.md
    - Session Files: concepts/session_files.md
    - Multi-Acquisition: concepts/multi_acquisition_and_photometry.md
  - Tutorials:
    - Overview: tutorials/00_overview.md
    - Installing MSW: tutorials/01_install.md
    - Your First Session: tutorials/02_first_session.md
    - Setup Config: tutorials/03_setup_config.md
    - Task Settings: tutorials/04_task_settings.md
    - Config Overlays: tutorials/05_config_overlays.md
    - Subject Management: tutorials/06_subject_management.md
    - Session Files: tutorials/07_session_files.md
    - Plot Spec: tutorials/08_plot_spec.md
    - Live Plot (optional): tutorials/09_live_plot.md
    - Monitor UI (optional): tutorials/10_monitor_ui.md
    - Hooks (optional): tutorials/11_hooks.md
    - Post-Processing (optional): tutorials/12_post_processing.md
    - Hardware Abstraction (optional): tutorials/13_hardware_abstraction.md
    - Valve Calibration (optional): tutorials/14_calibration.md
    - Calibration: tutorials/calibration.md
    - Adding a Setup: tutorials/adding_setup.md
    - Adding a Subject: tutorials/adding_subject.md
  - Tasks:
    - Sequence: tasks/sequence.md
    - Probabilistic Switching: tasks/probabilistic_switching.md
    - Probabilistic Switching (Fixed): tasks/probabilistic_switching_fixedsubjects.md
    - Calibration & Test: tasks/calibration_and_test.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_submodules: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
