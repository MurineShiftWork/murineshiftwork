---
  - name: example cmd module task
    hosts: setupsrpi
    remote_user: pi
    become: yes

    tasks:
      - name: mk data dir
        file:
          path: /home/pi/data
          state: directory

      - name: download miniconda
        command: "wget -q http://repo.continuum.io/miniconda/Miniconda3-latest-Linux-armv7l.sh -O miniconda-installer.sh"  # FIXME: overwrite file

      - name: install miniconda
        command: "sudo /bin/bash /home/pi/miniconda-installer.sh -b -p /home/pi/miniconda3 -f"  # use -f to force overwrite

      - name: add conda to path
        shell: |
          echo 'export PATH=/home/pi/miniconda3/bin:$PATH' >> /home/pi/.bashrc

      - name: rpi channel for conda
        command: "/home/pi/miniconda3/bin/conda config --add channels rpi"

      - name: chown
        command: "sudo chown -R pi:pi /home/pi/miniconda3"

      - name: add latest py
        command: "/home/pi/miniconda3/bin/conda install python=3.6 -y"

      - name: mk env
        command: "/home/pi/miniconda3/bin/conda create -n py36 python=3.6 numpy pandas -y -q"
