[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "murineshiftwork"
dynamic = ["version"]
description = "Murine Shift Work — behavioural task acquisition with hardware support."
readme = { file = "README.md", content-type = "text/markdown" }
license = { file = "LICENSE" }
authors = [
    { name = "Lars B. Rollik", email = "L.B.Rollik@protonmail.com" },
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "tqdm",
    "rich",
    "pyyaml",
    "pyzmq",
    "numpy",
    "scipy",
    "pandas",
    "pybpod-api",
    "safe-and-collaborative-architecture",
    "sounddevice",
    "opencv-python-headless",
    "seaborn",
]

[project.urls]
Repository = "https://github.com/larsrollik/murineshiftwork"
"Issue Tracker" = "https://github.com/larsrollik/murineshiftwork/issues"

[project.optional-dependencies]
dev = [
    "commitizen",
    "pytest",
    "pytest-cov",
    "pre-commit",
    "black",
    "flake8",
    "mkdocs-material",
    "mkdocs",
    "gitpython",
]
calibration = [
    "serial-scale-hx711",
    "serial-scale-bench",
]
keyboard = [
    "sshkeyboard",
]
qt = [
    "PyQt6",
    "pyqtgraph",
    "myterial",
]
rce = [
    "rpi_camera_ensemble",
]

[project.scripts]
murineshiftwork = "murineshiftwork.cli:run_cli"
msw = "murineshiftwork.cli:run_cli"

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["src/murineshiftwork"]

[tool.hatch.build.targets.sdist]
include = ["/src", "/tests", "/README.md", "/LICENSE", "/pyproject.toml"]

# ---------------------------------------------------------------------------
# Commitizen
# ---------------------------------------------------------------------------
# Bump workflow:
#   cz bump --yes    → reads conventional commits, determines next semver,
#                      updates [tool.commitizen] version + VERSION file,
#                      creates "bump: ..." commit and annotated tag v{version}.
#   git push && git push --tags → pushes bump commit + tag; triggers release CI.
#
# cz bump always produces a clean X.Y.Z tag — never dev or rc unless you pass
# --prerelease explicitly. Do NOT pass --prerelease in normal releases.
# .devN versions in pip show / __version__ between tags are computed at install
# time by hatch-vcs from git tags and are NOT written as git tags.
#
# version = "x.y.z" below is commitizen's own version tracking (updated on
# each bump commit). hatch-vcs derives the *package* version from git tags.
#
# Commit types that drive version:
#   feat:                      → minor  (x.1.0)
#   fix:                       → patch  (x.x.1)
#   feat!: / BREAKING CHANGE:  → major  (x.0.0)

[tool.commitizen]
name = "cz_conventional_commits"
version = "2.3.2"
tag_format = "v$version"
update_changelog_on_bump = false
version_files = ["VERSION"]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=murineshiftwork --durations=0"

# ---------------------------------------------------------------------------
# Black
# ---------------------------------------------------------------------------

[tool.black]
target-version = ["py312", "py313"]
line-length = 88
skip-string-normalization = false

# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 88
exclude = ["external", "playground", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

# ---------------------------------------------------------------------------
# Mypy
# ---------------------------------------------------------------------------

[tool.mypy]
mypy_path = "src"
namespace_packages = true
explicit_package_bases = true
ignore_missing_imports = true
exclude = ["external"]
