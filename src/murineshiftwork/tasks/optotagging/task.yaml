default:
  required_devices:
    - bpod
    - pulsepal
  barcode_bits: 37
  barcode_bit_duration_ms: 35.0
  barcode_init_duration_ms: 10.0
  barcode_tolerance: 0.25
  stimulation_defaults:
    n_trials: 50
    iti: 1.0
    record_video: false
    laser_power: null
    pulse_duration: 0.001
    pulse_frequency: 40
    pulse_train_duration: 1
    pulse_train_delay: 0
    trigger_channels_for_stimulation:
    - 0
    trigger_mode: gated
    channels_stimulation:
    - 0
    channels_ttl_copy: []
    reset_stimulation_after_sec: 0.005
    continuous: false
    waveform_on_ramp_type: null
    waveform_on_ramp_duration_s: 0.0
    waveform_center_duration_s: 0.0
    waveform_off_ramp_type: null
    waveform_off_ramp_duration_s: 0.0
  stimulation: {}
mode:
  # Example — copy to config_dir/tasks/optotagging/task.yaml and customise.
  example_protocol:
    stimulation:
      protocol_1ms_40hz:
        pulse_duration: 0.001
        pulse_frequency: 40
        pulse_train_duration: 1
  # Ramp-sweep diagnostic — runs 5 protocols with decreasing on-ramp durations.
  # Use to compare artifact profiles before choosing a ramp for real sessions.
  ramp_sweep:
    stimulation_defaults:
      n_trials: 10
      pulse_frequency: 5
      pulse_train_duration: 2
      laser_power: 0.5
      waveform_off_ramp_type: raised_cosine
      waveform_off_ramp_duration_s: 0.001
    stimulation:
      ramp_10ms:
        waveform_on_ramp_type: raised_cosine
        waveform_on_ramp_duration_s: 0.010
        waveform_center_duration_s: 0.005
      ramp_5ms:
        waveform_on_ramp_type: raised_cosine
        waveform_on_ramp_duration_s: 0.005
        waveform_center_duration_s: 0.005
      ramp_2ms:
        waveform_on_ramp_type: raised_cosine
        waveform_on_ramp_duration_s: 0.002
        waveform_center_duration_s: 0.003
      ramp_1ms:
        waveform_on_ramp_type: raised_cosine
        waveform_on_ramp_duration_s: 0.001
        waveform_center_duration_s: 0.003
      rectangular_ref:
        waveform_on_ramp_type: null
        waveform_center_duration_s: 0.005
