default:
  # --- Valve selection ---
  VALVES_TO_CALIBRATE:
  - 1
  - 3

  # --- Target delivery range ---
  TARGET_RANGE_UL:
  - 0.5
  - 8.0

  # --- Initial measurement grid ---
  # Leave empty [] to auto-generate N_INITIAL_POINTS evenly between
  # OPENING_TIME_MIN_S and OPENING_TIME_MAX_S.
  INITIAL_OPENING_TIMES_S: []
  OPENING_TIME_MIN_S: 0.005
  OPENING_TIME_MAX_S: 0.150
  N_INITIAL_POINTS: 5

  # --- Timing ---
  INTER_PULSE_INTERVAL_S: 0.150   # delay between individual drops
  SETTLE_TIME_S: 2.5              # wait after last drop before reading scale

  # --- Adaptive pulse count ---
  # n_pulses is chosen so that: n * vol_per_drop >= MIN_SNR * SCALE_NOISE_G * 1000
  SCALE_NOISE_G: 0.05             # estimated 1-sigma scale noise [g]
  MIN_SNR: 10                     # target signal-to-noise ratio for weight
  MIN_PULSES: 50                  # minimum drops regardless of SNR
  MAX_PULSES: 1000                # safety cap

  # --- Adaptive range expansion ---
  MAX_ADAPTIVE_ROUNDS: 3          # rounds of adding new opening times after initial grid
  COVERAGE_N_POINTS_TARGET: 5     # desired number of points within the target range

  # --- Outlier flagging (logged as warnings, does not stop the run) ---
  OUTLIER_SIGMA_THRESHOLD: 2.5

  # --- Save options ---
  force_save_calibration: false

mode: {}
