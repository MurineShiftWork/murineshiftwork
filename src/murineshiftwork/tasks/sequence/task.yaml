default:
  testing: false
  show_live_plot: true
  online_plot_poke_ymax_s: null        # clip poke raster y-axis in seconds; null = auto-range
  online_plot_poke_xmax_s: 6.0        # poke swarm + marginal histogram x-axis width in seconds
  online_plot_xlim_trials: 100        # trial x-axis window width; 0 = show all
  online_plot_poke_log_scale: true    # log y-axis for poke raster (false = linear)
  online_plot_first_poke_offset_s: 0.5  # fixed y-anchor for first poke in log raster; 0 = use real time
  # Soft-stop criteria — red reference lines + one-time console warning; no hard stop
  stop_reward_ul: 800.0
  stop_trials: 500
  stop_time_min: 60.0                 # 1 hour
  stop_level_delta: 15                # levels gained above session start_level
  record_video: false
  sequence:
  - 2
  - 1
  - 6
  - 3
  - 7
  training_levels_file: null
  start_level: 1
  reset_level: false
  buffer_trials: 10
  scoring_metric: ordered          # "ordered" = strfind (extra pokes allowed) | "perfect" = exact sequence only
  progression_threshold: 0.9
  regression_threshold: 0.2
  prevent_regression_below_start: false
  n_max_trials: 1500
  strict_sequence: false
  init_port_timeout_s: 10.0            # max wait for first poke; 0 = no timeout (wait forever)
  iti_duration: 0.4
  punish_duration: 0.5
  reward_sound: true
  reward_sound_frequency: -1
  reward_sound_duration: 0.2
  reward_sound_amplitude: 0.15
  reward_sound_device: HDA Intel PCH
  HARDWARE_BNC_TRIAL_START: 1
  HARDWARE_PORT_LEFT: 1
  HARDWARE_PORT_CENTER: 2
  HARDWARE_PORT_RIGHT: 3
  ttl_pulse_duration: 0.01
  barcode_bits: 37
  barcode_bit_duration_ms: 35.0
  barcode_init_duration_ms: 10.0
  barcode_tolerance: 0.25
  # Colors assigned in sequence order (first port → first color, etc.)
  port_colors:
    - '#34475C'
    - '#4BA5BF'
    - '#90C681'
    - '#FFD062'
    - '#ED6F5D'
    - '#ABBAB3'
  # Reward delay: fixed gap inserted between correct poke and valve opening.
  # reward_delay_ramp, if set, grows the delay linearly over completed task trials.
  reward_delay_s: 0.0
  reward_delay_ramp:
    start_s: 0.0
    increment_s: 0.0          # added per completed task trial; 0 = no ramp
    max_s: 0.0

  # Non-contingent reward: occasional free delivery at trial start before poke sequence.
  # free_reward_port: null = use the last port in sequence; or set to a port number (1–8).
  free_reward_probability: 0.0
  free_reward_ul: 1.8
  free_reward_port: null

  # Probabilistic reward perturbation — probe deviant reward amounts per poke.
  # target: "position" (0-indexed slot in sequence) or "port" (hardware port 1-8)
  # distribution: map from position/port index to list of {amount_ul, probability}
  #   amount_ul: float µL, or null = use nominal level amount
  #   probabilities may sum to < 1.0; remainder is implicitly nominal
  # matched_omission_duration: hold omission state open for the nominal valve duration
  #   so the negative prediction error is anchored to the expected reward time.
  reward_perturbation:
    enabled: false
    target: position
    matched_omission_duration: false
    distribution: {}
mode:
  # Named overrides — select with: msw run ... --task-mode <name>
  # Only params that differ from 'default:' need to be listed.
  habituation:
    start_level: 1
    reset_level: true
    progression_threshold: 0.75
    regression_threshold: 0.3
    n_max_trials: 300
    iti_duration: 0.6
  expert:
    n_max_trials: 1500
    prevent_regression_below_start: true
  probe:
    n_max_trials: 500
    reset_level: false
    prevent_regression_below_start: false
    progression_threshold: 0.95
  reward_probe:
    n_max_trials: 500
    prevent_regression_below_start: true
    reward_perturbation:
      enabled: true
      target: position
      distribution:
        4:                                      # final poke (position 4)
          - {amount_ul: 0.0,  probability: 0.15}   # 15% omission
          - {amount_ul: 3.6,  probability: 0.15}   # 15% doubled
          # remaining 70% → nominal level amount
