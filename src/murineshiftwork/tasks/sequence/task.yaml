default:
  testing: false
  show_live_plot: true
  record_video: false
  sequence:
  - 2
  - 1
  - 6
  - 3
  - 7
  training_levels_file: null
  start_level: 1
  reset_level: false
  buffer_trials: 10
  progression_threshold: 0.9
  regression_threshold: 0.2
  level_1_min_trials: 50
  prevent_regression_below_start: true
  n_max_trials: 1500
  strict_sequence: false
  iti_duration: 0.4
  punish_duration: 0.5
  reward_sound: true
  reward_sound_frequency: -1
  reward_sound_duration: 0.2
  reward_sound_amplitude: 0.15
  reward_sound_device: HDA Intel PCH
  HARDWARE_BNC_TRIAL_START: 1
  HARDWARE_PORT_LEFT: 1
  HARDWARE_PORT_CENTER: 2
  HARDWARE_PORT_RIGHT: 3
  ttl_pulse_duration: 0.01
  barcode_bits: 37
  barcode_bit_duration_ms: 35.0
  barcode_init_duration_ms: 10.0
  barcode_tolerance: 0.25
  # Colors assigned in sequence order (first port → first color, etc.)
  port_colors:
    - '#34475C'
    - '#4BA5BF'
    - '#90C681'
    - '#FFD062'
    - '#ED6F5D'
    - '#ABBAB3'
mode:
  # Named overrides — select with: msw run ... --task-mode <name>
  # Only params that differ from 'default:' need to be listed.
  habituation:
    start_level: 1
    reset_level: true
    progression_threshold: 0.75
    regression_threshold: 0.3
    n_max_trials: 300
    iti_duration: 0.6
  expert:
    n_max_trials: 1500
    prevent_regression_below_start: true
  probe:
    n_max_trials: 500
    reset_level: false
    prevent_regression_below_start: false
    progression_threshold: 0.95
